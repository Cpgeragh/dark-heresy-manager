name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: App tests
        run: npm run test:run

      # Firestore emulator needs a JRE
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Rules tests (emulator)
        run: npm run test:rules
